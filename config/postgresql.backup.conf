# PostgreSQL Configuration for CMP Backup Strategy
#
# This file contains recommended PostgreSQL configuration settings
# for implementing the CMP database backup strategy with WAL archiving.
#
# To apply these settings:
# 1. Append to your postgresql.conf file
# 2. Or include this file: include = 'postgresql.backup.conf'
# 3. Restart PostgreSQL: sudo systemctl restart postgresql
#

# ============================================================================
# WRITE-AHEAD LOG (WAL) ARCHIVING
# ============================================================================

# Enable WAL archiving for point-in-time recovery (PITR)
wal_level = replica                    # minimal, replica, or logical
                                       # (replica enables WAL archiving)

archive_mode = on                      # Enable archive mode

# Archive command - customize based on your setup
# Option 1: Local storage
archive_command = 'test ! -f /var/backups/postgres/wal/%f && cp %p /var/backups/postgres/wal/%f'

# Option 2: Cloud storage (GCS)
# archive_command = 'gsutil cp %p gs://cmp-backups/wal/%f'

# Option 3: Both local and cloud (recommended)
# archive_command = 'test ! -f /var/backups/postgres/wal/%f && cp %p /var/backups/postgres/wal/%f && gsutil cp %p gs://cmp-backups/wal/%f'

# Archive timeout (force WAL file switch after this many seconds)
# Set to 1 hour (3600s) to ensure at most 1 hour of data loss
archive_timeout = 3600                 # 1 hour

# ============================================================================
# WAL CONFIGURATION
# ============================================================================

# WAL segment size (default 16MB, can be set at initdb time only)
# Adjust based on write load - higher for heavy writes
# wal_segment_size = 16MB              # Cannot be changed after initdb

# Number of WAL files to keep in pg_wal directory
# This provides a buffer if archive_command fails temporarily
wal_keep_size = 1GB                    # Keep 1GB worth of WAL files
                                       # (~64 files at 16MB each)

# Maximum size of WAL directory
max_wal_size = 2GB                     # Trigger checkpoint at 2GB

# Minimum size of WAL directory (after cleanup)
min_wal_size = 512MB

# ============================================================================
# REPLICATION (Optional - for streaming replication)
# ============================================================================

# Maximum number of concurrent connections from standby servers
max_wal_senders = 3                    # Allow 3 standby servers

# Maximum number of replication slots
max_replication_slots = 3

# Timeout for replication connections (0 disables)
wal_sender_timeout = 60s               # 60 seconds

# ============================================================================
# CHECKPOINTS
# ============================================================================

# Time between automatic checkpoints (5min default)
checkpoint_timeout = 5min

# Target for checkpoint completion
checkpoint_completion_target = 0.9     # 90% of checkpoint_timeout

# Warning if checkpoints happen more frequently than this
checkpoint_warning = 30s

# ============================================================================
# RECOVERY SETTINGS (for standby/replica servers)
# ============================================================================

# These settings only apply when PostgreSQL is in recovery mode
# Uncomment for standby servers:

# restore_command = 'cp /var/backups/postgres/wal/%f %p'
# restore_command = 'gsutil cp gs://cmp-backups/wal/%f %p'

# recovery_target_time = '2026-03-15 14:30:00'  # For PITR
# recovery_target_action = 'promote'            # Action after reaching target

# ============================================================================
# MONITORING
# ============================================================================

# Log archive commands
log_archive_commands = on              # Log archive command execution

# Log checkpoints
log_checkpoints = on                   # Log checkpoint activity

# ============================================================================
# PERFORMANCE TUNING (Optional)
# ============================================================================

# Shared buffers (25% of RAM recommended)
# shared_buffers = 2GB

# Effective cache size (50-75% of RAM)
# effective_cache_size = 6GB

# Work memory (for sorts and hash tables)
# work_mem = 64MB

# Maintenance work memory (for VACUUM, CREATE INDEX)
# maintenance_work_mem = 512MB

# ============================================================================
# NOTES
# ============================================================================

# 1. After enabling archive_mode, you must restart PostgreSQL (reload is not sufficient)
# 2. Ensure archive_command directory exists and has correct permissions:
#    mkdir -p /var/backups/postgres/wal
#    chown postgres:postgres /var/backups/postgres/wal
#    chmod 700 /var/backups/postgres/wal
#
# 3. Test archive_command manually:
#    su - postgres
#    archive_command='test ! -f /var/backups/postgres/wal/test.wal && cp /var/lib/postgresql/data/pg_wal/000000010000000000000001 /var/backups/postgres/wal/test.wal'
#    eval $archive_command
#
# 4. Monitor WAL archiving:
#    SELECT * FROM pg_stat_archiver;
#
# 5. Check current WAL settings:
#    SHOW wal_level;
#    SHOW archive_mode;
#    SHOW archive_command;
#
# 6. For more information:
#    https://www.postgresql.org/docs/current/continuous-archiving.html
