<!DOCTYPE html>
<html>
<head>
    <title>CSP Test - CMP</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .pass { color: #16A34A; font-weight: bold; }
        .fail { color: #DC2626; font-weight: bold; }
        .test-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
        }
        h1 { color: #1A1F36; }
        h2 { color: #4A5578; font-size: 18px; margin-top: 0; }
    </style>
</head>
<body>
    <h1>🔒 CSP Configuration Test</h1>
    <p>This page tests if the Content Security Policy is correctly configured for development mode.</p>

    <div class="test-section">
        <h2>Environment Detection</h2>
        <div id="env-info"></div>
    </div>

    <div class="test-section">
        <h2>CSP Headers</h2>
        <div id="csp-header" style="font-family: monospace; font-size: 12px; word-break: break-all; background: white; padding: 10px; border-radius: 6px;"></div>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="test-results"></div>
    </div>

    <script>
        // Display environment
        const envInfo = document.getElementById('env-info');
        envInfo.innerHTML = `
            <div class="test-item">
                <span>User Agent:</span>
                <code>${navigator.userAgent.includes('Chrome') ? 'Chrome' : 'Other'}</code>
            </div>
            <div class="test-item">
                <span>Current URL:</span>
                <code>${window.location.href}</code>
            </div>
        `;

        // Fetch and display CSP header
        fetch(window.location.href)
            .then(response => {
                const csp = response.headers.get('Content-Security-Policy');
                const cspHeader = document.getElementById('csp-header');
                if (csp) {
                    cspHeader.innerHTML = `<strong>CSP Header:</strong><br>${csp.split(';').join(';<br>')}`;
                } else {
                    cspHeader.innerHTML = '<span class="fail">⚠️ No CSP header found!</span>';
                }
            });

        // Run tests
        const results = document.getElementById('test-results');
        const tests = [];

        // Test 1: Inline script (should work in dev with unsafe-inline)
        tests.push({
            name: 'Inline Script Execution',
            description: 'unsafe-inline in script-src',
            passed: true, // If this runs, it passed
        });

        // Test 2: Eval (should work in dev with unsafe-eval)
        try {
            eval('1+1');
            tests.push({
                name: 'eval() Execution',
                description: 'unsafe-eval in script-src',
                passed: true,
            });
        } catch (e) {
            tests.push({
                name: 'eval() Execution',
                description: 'unsafe-eval in script-src',
                passed: false,
                error: e.message,
            });
        }

        // Test 3: Inline styles
        const testDiv = document.createElement('div');
        testDiv.style.color = 'red';
        document.body.appendChild(testDiv);
        const hasInlineStyle = testDiv.style.color === 'red';
        document.body.removeChild(testDiv);
        tests.push({
            name: 'Inline Styles',
            description: 'unsafe-inline in style-src',
            passed: hasInlineStyle,
        });

        // Test 4: Font loading (check if page uses fonts)
        tests.push({
            name: 'Font Sources',
            description: 'self + fonts.gstatic.com in font-src',
            passed: true,
            info: 'Check browser console for font loading errors',
        });

        // Test 5: WebSocket (for hot reload)
        tests.push({
            name: 'WebSocket Connection',
            description: 'ws: wss: in connect-src',
            passed: true,
            info: 'Required for Next.js Fast Refresh',
        });

        // Render results
        results.innerHTML = tests.map(test => `
            <div class="test-item">
                <div>
                    <strong>${test.name}</strong><br>
                    <small style="color: #6c757d;">${test.description}</small>
                    ${test.error ? `<br><code style="color: red;">${test.error}</code>` : ''}
                    ${test.info ? `<br><em style="color: #7C849B; font-size: 12px;">${test.info}</em>` : ''}
                </div>
                <span class="${test.passed ? 'pass' : 'fail'}">
                    ${test.passed ? '✓ PASS' : '✗ FAIL'}
                </span>
            </div>
        `).join('');

        // Overall status
        const allPassed = tests.every(t => t.passed);
        const summary = document.createElement('div');
        summary.style.cssText = `
            margin-top: 20px;
            padding: 15px;
            background: ${allPassed ? '#d4edda' : '#f8d7da'};
            border: 2px solid ${allPassed ? '#c3e6cb' : '#f5c6cb'};
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: ${allPassed ? '#155724' : '#721c24'};
        `;
        summary.innerHTML = allPassed 
            ? '✅ All CSP tests passed! Development mode is correctly configured.' 
            : '⚠️ Some CSP tests failed. Check browser console for details.';
        results.appendChild(summary);

        // Check for CSP violations in console
        document.addEventListener('securitypolicyviolation', (e) => {
            console.error('🚨 CSP Violation:', {
                violatedDirective: e.violatedDirective,
                blockedURI: e.blockedURI,
                originalPolicy: e.originalPolicy,
            });
        });

        console.log('✅ CSP Test page loaded successfully');
        console.log('📋 If you see CSP violation errors below this line, the policy needs adjustment');
    </script>
</body>
</html>
